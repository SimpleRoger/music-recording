kind = "web"
previewPath = "/"
title = "YouTube Channel Feed"
version = "1.0.0"
id = "artifacts/youtube-feed"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18751

[services.development]
run = "pnpm --filter @workspace/youtube-feed run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/youtube-feed", "run", "build" ]
publicDir = "artifacts/youtube-feed/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18751"
BASE_PATH = "/"
